<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Utilisateurs KONAMI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 3px solid #c00010;
            padding-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #c00010;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .timestamp {
            color: #999;
            font-size: 12px;
        }
        .no-users {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #c00010;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Tableau d'administration - Utilisateurs KONAMI</h1>
        <div id="usersContainer">
            <div class="no-users">Chargement des données...</div>
        </div>
        <a href="page1.html" class="back-link">← Retour à l'accueil</a>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        // Récupérer et afficher les utilisateurs
        fetch(`${API_BASE_URL}/api/users`)
            .then(res => res.json())
            .then(users => {
                const container = document.getElementById('usersContainer');
                
                if (!users || users.length === 0) {
                    container.innerHTML = '<div class="no-users">Aucun utilisateur enregistré.</div>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Mot de passe</th>
                                <th>ID</th>
                                <th>Date d'inscription</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                users.forEach(user => {
                    const date = new Date(user.registeredAt).toLocaleString('fr-FR');
                    html += `
                        <tr>
                            <td>${user.email}</td>
                            <td><strong>${user.password}</strong></td>
                            <td><code>${user.id}</code></td>
                            <td><span class="timestamp">${date}</span></td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                    <p style="margin-top: 20px; color: #666; font-size: 14px;">
                        📊 Total : <strong>${users.length}</strong> utilisateur(s) enregistré(s)
                    </p>
                `;

                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('usersContainer').innerHTML = 
                    '<div class="no-users">⚠️ Erreur : impossible de charger les données</div>';
                console.error(err);
            });
    </script>
</body>
</html>
